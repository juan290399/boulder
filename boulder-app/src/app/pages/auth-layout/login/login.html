    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Ingresa tus credenciales para acceder</p>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" required placeholder="ejemplo@correo.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" required placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="loading" class="btn-primary">
        {{ loading ? 'Cargando...' : 'Ingresar' }}
      </button>
    </form>

    <div class="footer-links">
      ¿No tienes cuenta? <a routerLink="/auth/register">Regístrate aquí</a>
    </div>
