<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Plataforma Boulder</h2>
      <p>Control Operativo de Sondajes Mineros</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin($event)">
      
      <div class="form-group">
      <label for="usuario">Usuario / Identificador</label>
      <input 
        type="text" 
        id="usuario" 
        formControlName="usuario" 
        placeholder="Ingrese su cuenta de usuario" 
        class="form-control" /> </div>

    <div class="form-group">
      <label for="contrasenia">Contraseña</label>
      <input 
        type="password" 
        id="contrasenia" 
        formControlName="contrasenia" 
        placeholder="••••••••" 
        class="form-control" /> </div>

      <p *ngIf="errorMessage" class="text-danger small mt-2">{{ errorMessage }}</p>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Iniciar Sesión</span>
        <span *ngIf="loading" class="spinner">Autenticando...</span>
      </button>
    </form>
  </div>
</div>
