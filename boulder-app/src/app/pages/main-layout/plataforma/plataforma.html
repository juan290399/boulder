<div class="container-fluid py-4">
  <div class="card shadow-sm border-0 p-4">
    <h1 class="mb-4">Plataformas de Trabajo</h1>

    <div class="row mb-4">
      <div class="col-md-2">
        <input class="form-control" placeholder="Código" [(ngModel)]="form.codigo">
      </div>
      <div class="col-md-3">
        <input class="form-control" placeholder="Nombre de Plataforma" [(ngModel)]="form.nombre">
      </div>
      <div class="col-md-3">
        <input class="form-control" placeholder="Ubicación / Coordenadas" [(ngModel)]="form.ubicacion">
      </div>
      <div class="col-md-2">
        <input class="form-control" placeholder="Capacidad Máx." [(ngModel)]="form.capacidad">
      </div>
      <div class="col-md-2">
        <select class="form-select" [(ngModel)]="form.estado">
          <option value="ACTIVA">Activa</option>
          <option value="MANTENIMIENTO">Mantenimiento</option>
          <option value="INACTIVA">Inactiva</option>
        </select>
      </div>
    </div>

    <div class="mb-4">
      <button class="btn btn-success me-2" (click)="crearPlataforma()">
        Crear Plataforma
      </button>
      <button class="btn btn-primary me-2" (click)="actualizarPlataforma()">
        Actualizar
      </button>
      <button class="btn btn-secondary" (click)="limpiarFormulario()">
        Limpiar
      </button>
    </div>

    <hr class="my-4" />

    <div class="row mb-4">
      <div class="col-md-6">
        <div class="input-group">
          <input class="form-control" placeholder="Buscar por código..." [(ngModel)]="busquedaCodigo">
          <button class="btn btn-dark" (click)="buscarPorCodigo()">Buscar</button>
        </div>
      </div>
      <div class="col-md-6">
        <div class="input-group">
          <input class="form-control" placeholder="Buscar por ID interno..." [(ngModel)]="busquedaId">
          <button class="btn btn-info text-white" (click)="buscarPorId()">Buscar</button>
        </div>
      </div>
    </div>

    <button class="btn btn-outline-primary mb-3" (click)="listarPlataformas()">
      Refrescar Listado
    </button>

    <div class="row" *ngIf="plataformas.length > 0">
      <div class="col-md-4 mb-3" *ngFor="let plat of plataformas">
        <div class="card shadow-sm h-100">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <h5 class="card-title fw-bold text-dark">{{ plat.nombre }}</h5>
              <p class="mb-1"><b>Código:</b> {{ plat.codigo }}</p>
              <p class="mb-1"><b>Ubicación:</b> {{ plat.ubicacion }}</p>
              <p class="mb-2"><b>Capacidad:</b> {{ plat.capacidad }}</p>
              
              <span class="badge bg-success" *ngIf="plat.estado === 'ACTIVA'">
                Activa
              </span>
              <span class="badge bg-warning text-dark" *ngIf="plat.estado === 'MANTENIMIENTO'">
                Mantenimiento
              </span>
              <span class="badge bg-danger" *ngIf="plat.estado === 'INACTIVA'">
                Inactiva
              </span>
            </div>

            <button class="btn btn-sm btn-warning mt-3 w-100 fw-medium" (click)="editar(plat)">
              Editar Datos
            </button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="plataformas.length === 0" class="alert alert-light text-center border p-4">
      No hay plataformas registradas o encontradas para mostrar.
    </div>

  </div>
</div>
