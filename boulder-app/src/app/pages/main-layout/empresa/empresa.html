<div class="container-fluid py-4">
  <div class="card shadow-sm border-0 p-4">
    <h1 class="mb-4">Gestión de Empresas</h1>

    <div class="row mb-4">
      <div class="col-md-2">
        <input class="form-control" placeholder="NIT / Identificación" [(ngModel)]="form.nit">
      </div>
      <div class="col-md-3">
        <input class="form-control" placeholder="Razón Social / Nombre" [(ngModel)]="form.nombre">
      </div>
      <div class="col-md-2">
        <input class="form-control" placeholder="Teléfono" [(ngModel)]="form.telefono">
      </div>
      <div class="col-md-3">
        <input class="form-control" type="email" placeholder="Correo Electrónico" [(ngModel)]="form.correo">
      </div>
      <div class="col-md-2">
        <select class="form-select" [(ngModel)]="form.estado">
          <option value="ACTIVA">Activa</option>
          <option value="INACTIVA">Inactiva</option>
          <option value="EN_REVISION">En Revisión</option>
        </select>
      </div>
    </div>

    <div class="mb-4">
      <button class="btn btn-success me-2" (click)="crearEmpresa()">
        Registrar Empresa
      </button>
      <button class="btn btn-primary me-2" (click)="actualizarEmpresa()">
        Actualizar
      </button>
      <button class="btn btn-secondary" (click)="limpiarFormulario()">
        Limpiar
      </button>
    </div>

    <hr class="my-4" />

    <div class="row mb-4">
      <div class="col-md-6">
        <div class="input-group">
          <input class="form-control" placeholder="Buscar por NIT..." [(ngModel)]="busquedaNit">
          <button class="btn btn-dark" (click)="buscarPorNit()">Buscar</button>
        </div>
      </div>
      <div class="col-md-6">
        <div class="input-group">
          <input class="form-control" placeholder="Buscar por ID interno..." [(ngModel)]="busquedaId">
          <button class="btn btn-info text-white" (click)="buscarPorId()">Buscar</button>
        </div>
      </div>
    </div>

    <button class="btn btn-outline-primary mb-3" (click)="listarEmpresas()">
      Refrescar Listado
    </button>

    <div class="row" *ngIf="empresas.length > 0">
      <div class="col-md-4 mb-3" *ngFor="let emp of empresas">
        <div class="card shadow-sm h-100">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <h5 class="card-title fw-bold text-dark">{{ emp.nombre }}</h5>
              <p class="mb-1"><b>NIT:</b> {{ emp.nit }}</p>
              <p class="mb-1"><b>Teléfono:</b> {{ emp.telefono || 'No registrado' }}</p>
              <p class="mb-2"><b>Correo:</b> {{ emp.correo || 'No registrado' }}</p>
              
              <span class="badge bg-success" *ngIf="emp.estado === 'ACTIVA'">
                Activa
              </span>
              <span class="badge bg-danger" *ngIf="emp.estado === 'INACTIVA'">
                Inactiva
              </span>
              <span class="badge bg-warning text-dark" *ngIf="emp.estado === 'EN_REVISION'">
                En Revisión
              </span>
            </div>

            <button class="btn btn-sm btn-warning mt-3 w-100 fw-medium" (click)="editar(emp)">
              Editar Empresa
            </button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="empresas.length === 0" class="alert alert-light text-center border p-4">
      No se encontraron empresas registradas.
    </div>

  </div>
</div>
